  # ---------- Google News (meta-aggregator, title-only) ----------
  # Google News dedups across hundreds of publishers and exposes RSS
  # per country/language. The items arrive with publisher attribution
  # via `entry.source.title`. The article URL is a JS-redirected
  # `news.google.com/rss/articles/...` link that doesn't resolve
  # server-side, so the normalizer skips trafilatura on these
  # (kind=googlenews is in SKIP_BODY_FETCH_KINDS). Items contribute
  # cluster signal but not body content; pair with rich sources above.
  - slug: gn_in_top_en
    name: Google News — India Top (EN)
    url: https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en
    kind: googlenews
    language: en
    region: IN
    category: general
    authority: 0.65
  - slug: gn_in_top_hi
    name: Google News — India Top (HI)
    url: https://news.google.com/rss?hl=hi-IN&gl=IN&ceid=IN:hi
    kind: googlenews
    language: hi
    region: IN
    category: general
    authority: 0.65

