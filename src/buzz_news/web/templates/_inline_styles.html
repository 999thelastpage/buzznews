{# Combined tokens + components CSS — inlined in <head> per Design.md §6 #}
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap');

:root {
  --paper: #F4F0E8; --paper-2: #EDE7DC; --paper-3: #E4DDD0;
  --ink: #1A1614; --ink-soft: #3D3530; --ink-2: #0E0B09;
  --muted: #807771; --muted-2: #A39A92;
  --hairline: rgba(26,22,20,0.10); --hairline-2: rgba(26,22,20,0.05);
  --accent: #A8421E; --buzz: #C44830;
  --c-intl: #4285f4; --c-pol: #B084D0; --c-biz: #34a853; --c-tech: #e67c73;
  --c-sport: #ea4335; --c-film: #8C3A5C; --c-sci: #4A6B8C; --c-gen: #9e9e9e;
  --serif: 'Playfair Display', 'Georgia', serif;
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --rail: 14px; --gap: 6px; --measure: 760px;

  /* Mockup variables mapped to theme colors */
  --card-bg: var(--paper-2);
  --card-hover: var(--paper-3);
  --grid-line: var(--hairline);
  --text-main: var(--ink);
  --text-muted: var(--muted);
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #0c0c0c; --paper-2: #121212; --paper-3: #1a1a1a;
    --ink: #f0f0f0; --ink-soft: #cccccc; --ink-2: #050403;
    --muted: #888888; --muted-2: #666666;
    --hairline: #2a2a2a; --hairline-2: rgba(232,226,214,0.06);
    --accent: #E07A5F; --buzz: #E55339;
    --c-intl: #4285f4; --c-pol: #B084D0; --c-biz: #34a853;
    --c-tech: #e67c73; --c-sport: #ea4335; --c-film: #D08AA8;
    --c-sci: #8FB0D0; --c-gen: #9e9e9e;

    /* Mockup variables mapped to theme colors */
    --card-bg: var(--paper-2);
    --card-hover: var(--paper-3);
    --grid-line: var(--hairline);
    --text-main: var(--ink);
    --text-muted: var(--muted);
  }
}
@media (min-width: 720px) { :root { --rail: 24px; } }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--serif); font-size: 16px; line-height: 1.5; color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased; font-feature-settings: "kern", "liga"; }
a { color: inherit; text-decoration: none; } a:hover { color: var(--accent); }
img { max-width: 100%; height: auto; display: block; }
.mast { display: flex; align-items: baseline; justify-content: space-between; padding: 14px var(--rail) 12px; border-bottom: 1px solid var(--ink); }
.mast__brand { font-family: var(--serif); font-size: 22px; font-weight: 400; font-style: italic; letter-spacing: -0.012em; color: var(--ink); }
.mast__brand .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--buzz); margin: 0 1px 0 3px; vertical-align: 3px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.mast__meta { font-family: var(--sans); font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.11em; }
.mast__meta a { color: var(--muted); }
.mast__lang { margin-left: 8px; } .mast__lang a { padding: 0 2px; } .mast__lang a.is-active { color: var(--ink); font-weight: 600; }
.mast__back { color: var(--muted); }

/* Rotating Headline Bar */
.headline-bar {
  display: none;
  align-items: center;
  font-family: var(--sans);
  font-size: 12px;
  margin-left: 15px;
  margin-right: 15px;
  flex-grow: 1;
  max-width: none;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  border-left: 1px solid var(--grid-line);
  padding-left: 15px;
}
@media (min-width: 768px) {
  .headline-bar { display: flex; }
}
.headline-bar__label {
  font-weight: 600;
  color: var(--buzz);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 8px;
  flex-shrink: 0;
}
.headline-bar__content {
  position: relative;
  height: 20px;
  flex-grow: 1;
  overflow: hidden;
}
.headline-bar__item {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
  color: var(--text-main);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: inline-block;
}
.headline-bar__item.is-active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.headline-bar__item:hover {
  color: var(--accent);
}

.s-intl  { box-shadow: inset 3px 0 0 0 var(--c-intl); } .s-pol   { box-shadow: inset 3px 0 0 0 var(--c-pol); } .s-biz   { box-shadow: inset 3px 0 0 0 var(--c-biz); } .s-tech  { box-shadow: inset 3px 0 0 0 var(--c-tech); } .s-sport { box-shadow: inset 3px 0 0 0 var(--c-sport); } .s-film  { box-shadow: inset 3px 0 0 0 var(--c-film); } .s-sci   { box-shadow: inset 3px 0 0 0 var(--c-sci); } .s-gen   { box-shadow: inset 3px 0 0 0 var(--c-gen); }
.k-intl  { color: var(--c-intl); } .k-pol   { color: var(--c-pol); } .k-biz   { color: var(--c-biz); } .k-tech  { color: var(--c-tech); } .k-sport { color: var(--c-sport); } .k-film  { color: var(--c-film); } .k-sci   { color: var(--c-sci); } .k-gen   { color: var(--c-gen); }
.hot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--buzz); animation: pulse 3s ease-in-out infinite; margin-right: 5px; vertical-align: 2px; }
.mos { padding: 12px var(--rail); display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); grid-auto-flow: dense; grid-auto-rows: minmax(110px, auto); }
.tile { background: var(--paper-2); padding: 10px 10px 9px 13px; display: flex; flex-direction: column; overflow: hidden; position: relative; transition: background 0.15s ease; }
.tile:hover, .tile:active { background: var(--paper-3); }
.tile__cat { font-family: var(--sans); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.11em; margin-bottom: 5px; display: flex; align-items: baseline; justify-content: space-between; }
.tile__cat-time { color: var(--muted); font-weight: 500; letter-spacing: 0.06em; font-variant-numeric: tabular-nums; }
.tile__title { font-family: var(--serif); font-weight: 400; line-height: 1.22; letter-spacing: -0.005em; color: var(--ink); display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.tile__src { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile__src strong { color: var(--ink-soft); font-weight: 500; }
.tile--2x2 { grid-column: span 2; grid-row: span 2; background: #0E0B09; color: #F4F0E8; padding: 14px 14px 12px 17px; }
.tile--2x2:hover { background: #1A1614; }
.tile--2x2 .tile__cat { font-size: 9.5px; color: rgba(244,240,232,0.85); } .tile--2x2 .tile__cat-time { color: rgba(244,240,232,0.55); }
.tile--2x2 .tile__title { color: #F4F0E8; font-size: 19px; line-height: 1.18; letter-spacing: -0.012em; -webkit-line-clamp: 5; margin-bottom: 8px; }
.tile--2x2 .tile__src { color: rgba(244,240,232,0.65); font-size: 11px; } .tile--2x2 .tile__src strong { color: rgba(244,240,232,0.9); }
.tile--2x1 { grid-column: span 2; } .tile--2x1 .tile__title { font-size: 14px; -webkit-line-clamp: 3; } .tile--2x1 .tile__src { font-size: 10.5px; }
.tile--1x1 { grid-column: span 1; } .tile--1x1 .tile__title { font-size: 12.5px; line-height: 1.2; -webkit-line-clamp: 3; } .tile--1x1 .tile__src { font-size: 9.5px; }
/* Default (phones <=480px): 2 cols, rows grow with content */
@media (min-width: 481px) and (max-width: 719px) { .mos { grid-template-columns: repeat(4, 1fr); grid-auto-rows: minmax(96px, auto); } .tile--2x2 { grid-column: span 2; grid-row: span 2; } .tile--2x1 { grid-column: span 2; } .tile--1x1 { grid-column: span 1; } }
@media (min-width: 720px) { .mos { grid-template-columns: repeat(6, 1fr); grid-auto-rows: minmax(100px, auto); gap: 8px; } .tile--2x2 { grid-column: span 3; grid-row: span 2; } .tile--2x1 { grid-column: span 3; } .tile--1x1 { grid-column: span 2; } .tile--2x2 .tile__title { font-size: 23px; } .tile--2x1 .tile__title { font-size: 15.5px; } .tile--1x1 .tile__title { font-size: 13.5px; } .mos > :last-child { grid-column: 1 / -1; } }

/* CSS Grid System for Magazine layout */
.grid-container {
  display: grid;
  gap: 1px;
  background-color: var(--grid-line);
  border: 1px solid var(--grid-line);
  grid-template-columns: 1fr;
  grid-auto-flow: dense;
}

/* Base Card styling */
.news-card {
  background-color: var(--card-bg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  transition: background-color 0.2s ease;
  min-height: 180px;
}

.news-card:hover {
  background-color: var(--card-hover);
}

.card-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 16px;
  font-weight: 600;
}

.time { color: var(--text-muted); font-weight: 400; }

.category {
  font-family: var(--sans);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.cat-intl, .k-intl { color: var(--c-intl); }
.cat-tech, .k-tech { color: var(--c-tech); }
.cat-gen, .k-gen { color: var(--c-gen); }
.cat-biz, .k-biz { color: var(--c-biz); }
.cat-sport, .k-sport { color: var(--c-sport); }
.cat-pol, .k-pol { color: var(--c-pol); }
.cat-film, .k-film { color: var(--c-film); }
.cat-sci, .k-sci { color: var(--c-sci); }

.card-title {
  font-family: var(--serif);
  font-size: 22px;
  line-height: 1.4;
  margin: 0 0 16px 0;
  font-weight: 400;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  overflow: hidden;
  -webkit-line-clamp: 4;
}

.card-large .card-title {
  font-size: 34px;
  -webkit-line-clamp: 5;
}

.card-huge .card-title {
  font-size: 46px;
  -webkit-line-clamp: 5;
}

.card-excerpt {
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--text-muted);
  margin-bottom: 16px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  overflow: hidden;
  -webkit-line-clamp: 2;
}

.hidden-excerpt .card-excerpt {
  display: none !important;
}

.hide-excerpt-default .card-excerpt {
  display: -webkit-box;
  -webkit-line-clamp: 1;
}

.card-large .card-excerpt, .card-huge .card-excerpt {
  font-size: 15px;
  margin-bottom: 24px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
}

.card-footer {
  margin-top: auto;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
}

@media (min-width: 768px) {
  .grid-container { grid-template-columns: repeat(6, 1fr); }
  .col-12 { grid-column: span 6; }
  .col-8 { grid-column: span 6; }
  .col-6 { grid-column: span 3; }
  .col-4 { grid-column: span 2; }
  .col-3 { grid-column: span 3; }
}

@media (min-width: 1024px) {
  .grid-container { grid-template-columns: repeat(12, 1fr); }
  .col-12 { grid-column: span 12; }
  .col-8 { grid-column: span 8; }
  .col-6 { grid-column: span 6; }
  .col-4 { grid-column: span 4; }
  .col-3 { grid-column: span 3; }
}

.article__kicker .hot { background: var(--buzz); }
.article__title { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.13; letter-spacing: -0.014em; color: #F4F0E8; margin-bottom: 14px; }
.article__byline { font-family: var(--sans); font-size: 11.5px; color: rgba(244,240,232,0.55); letter-spacing: 0.02em; } .article__byline strong { color: #F4F0E8; font-weight: 500; }

.article__body { font-family: var(--serif); font-size: 17px; line-height: 1.7; color: var(--ink); padding: 22px 4px 8px; max-width: 640px; margin: 0 auto; }
.article__body p { margin-bottom: 1.1em; } .article__body p:first-of-type::first-line { font-variant: small-caps; letter-spacing: 0.04em; } .article__body em { color: var(--ink); font-style: italic; }
.next { max-width: 640px; margin: 14px auto 0; background: var(--paper-2); border-left: 2px solid var(--accent); padding: 14px 16px; font-size: 15px; line-height: 1.55; color: var(--ink-soft); }
.next__label { display: block; font-family: var(--sans); font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); margin-bottom: 5px; }
.src-mos { max-width: 640px; margin: 28px auto 0; } .src-mos__h { font-family: var(--sans); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--ink); }
.src-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); }
.src-tile { background: var(--paper-2); padding: 9px 11px; display: flex; flex-direction: column; gap: 4px; font-family: var(--sans); min-height: 64px; }
.src-tile:hover { background: var(--paper-3); }
.src-tile__head { display: flex; justify-content: space-between; align-items: baseline; font-size: 10.5px; }
.src-tile__name { color: var(--ink); font-weight: 600; letter-spacing: 0.01em; } .src-tile__time { color: var(--muted); font-variant-numeric: tabular-nums; }
.src-tile__title { font-family: var(--serif); font-size: 12.5px; line-height: 1.25; color: var(--ink-soft); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tl { max-width: 640px; margin: 28px auto 0; } .tl__h { font-family: var(--sans); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--ink); }
.tl-ev { display: grid; grid-template-columns: 44px 1fr; gap: 12px; padding: 8px 0; font-family: var(--sans); font-size: 12.5px; align-items: baseline; }
.tl-ev__t { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; font-variant-numeric: tabular-nums; }
.tl-ev__x { color: var(--ink-soft); line-height: 1.45; } .tl-ev__x strong { color: var(--ink); font-weight: 600; }
.related { max-width: 760px; margin: 28px auto 0; } .related__h { font-family: var(--sans); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--ink); }
.related__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
@media (max-width: 480px) { .related__grid { grid-template-columns: repeat(2, 1fr); } }

.win.is-active { background: #0E0B09; color: #F4F0E8; }
.win__label { font-family: var(--sans); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 6px; }
.win.is-active .win__label { color: rgba(244,240,232,0.55); }
.win__head { font-family: var(--serif); font-size: 14px; line-height: 1.2; letter-spacing: -0.005em; color: var(--ink); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.win.is-active .win__head { color: #F4F0E8; }

.win.is-active .win__foot { color: rgba(244,240,232,0.55); }
